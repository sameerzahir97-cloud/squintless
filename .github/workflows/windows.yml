name: windows

on:
  push:
    branches: [main]
  pull_request:

jobs:
  analyze:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          $issues = @()
          $issues += Invoke-ScriptAnalyzer -Path install.ps1 -Settings PSScriptAnalyzerSettings.psd1
          $issues += Invoke-ScriptAnalyzer -Path module -Recurse -Settings PSScriptAnalyzerSettings.psd1
          $issues | Format-Table -AutoSize
          if ($issues) {
            throw "PSScriptAnalyzer found $($issues.Count) issue(s)"
          }

      - name: Test module manifest
        shell: pwsh
        run: Test-ModuleManifest module/Squintless/Squintless.psd1

      - name: Pester tests
        shell: pwsh
        run: |
          if (Test-Path tests/Squintless.Tests.ps1) {
            Install-Module Pester -Force -Scope CurrentUser -SkipPublisherCheck
            $r = Invoke-Pester -Path tests -PassThru
            if ($r.FailedCount -gt 0) { throw "$($r.FailedCount) Pester test(s) failed" }
          } else {
            Write-Host "no Pester tests yet (added in Phase 1)"
          }
