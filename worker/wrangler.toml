name = "squintless"
main = "src/index.ts"
compatibility_date = "2026-06-01"
workers_dev = true

# Custom-domain routes — only /sq and /sh are intercepted; every other path on the
# zone is untouched and served normally. Remove these lines + redeploy to revert.
routes = [
  { pattern = "sameerzahir.com/sq", zone_name = "sameerzahir.com" },
  { pattern = "sameerzahir.com/sh", zone_name = "sameerzahir.com" },
]
